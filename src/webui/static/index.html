<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>rag-proto · console</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="mark">rag-proto</span>
      <span class="sub">console</span>
    </div>
    <div class="chips" id="chips"></div>
    <div class="spacer"></div>
    <button class="btn primary" id="btn-ask">＋ Ask</button>
    <button class="btn" id="btn-eval">Run eval</button>
    <button class="btn icon ghost" id="btn-theme" title="Toggle theme" aria-label="Toggle theme">◐</button>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <span class="eyebrow">Runs</span>
        <button class="btn icon ghost" id="btn-refresh" title="Refresh runs" aria-label="Refresh runs">⟳</button>
      </div>
      <div id="run-list"></div>
    </aside>
    <main class="main"><div class="main-inner" id="view"></div></main>
  </div>

  <div id="modal-root"></div>
  <script src="/app.js"></script>
</body>
</html>
